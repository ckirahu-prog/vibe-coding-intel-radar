# 信息采集源清单
# tier: A = 必收录（跳过关键词过滤）, B = 需关键词命中
# type: rss | github_search

sources:
  # ── AI 做游戏 ──────────────────────────────────────────

  - id: hn-ai-game
    name: "HN Search: AI game"
    type: rss
    url: "https://hnrss.org/newest?q=AI+game+OR+gamedev+AI&points=3"
    topics: [ai-game-dev]
    tier: B

  - id: reddit-gamedev
    name: "Reddit r/gamedev"
    type: rss
    url: "https://www.reddit.com/r/gamedev/.rss"
    topics: [ai-game-dev]
    tier: B

  - id: reddit-unity3d
    name: "Reddit r/Unity3D"
    type: rss
    url: "https://www.reddit.com/r/Unity3D/.rss"
    topics: [ai-game-dev]
    tier: B

  - id: reddit-unrealengine
    name: "Reddit r/unrealengine"
    type: rss
    url: "https://www.reddit.com/r/unrealengine/.rss"
    topics: [ai-game-dev]
    tier: B

  - id: github-game-ai
    name: "GitHub: game-dev + AI repos"
    type: github_search
    query: "topic:game-development ai pushed:>7d"
    topics: [ai-game-dev]
    tier: A

  - id: gd-ai
    name: "Game Developer"
    type: rss
    url: "https://www.gamedeveloper.com/rss.xml"
