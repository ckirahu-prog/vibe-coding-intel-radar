name: Send Report Email

# 日报 commit（Daily Collect）或周报 commit（Cursor Automation 周六）后自动发 QQ 邮箱
on:
  push:
    branches: [main]
    paths:
      - 'reports/daily/**'
      - 'reports/weekly/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check mail secrets
        id: mailcfg
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          if [ -n "$MAIL_USERNAME" ] && [ -n "$MAIL_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: set MAIL_USERNAME and MAIL_PASSWORD in repo Secrets."
          fi

      - name: Checkout
        if: steps.mailcfg.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed reports
        if: steps.mailcfg.outputs.configured == 'true'
        id: detect
        run: |
          FILES=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
            | grep -E '^reports/(daily|weekly)/[0-9A-Za-z._-]+\.md$' || true)

          if [ -z "$FILES" ]; then
            echo "No report markdown in this commit."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "Changed report files:"
          echo "$FILES"

          SUBJECT="【信息雷达】新报告"
          BODY=""
          HAS_DAILY=false
          HAS_WEEKLY=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            fname=$(basename "$f" .md)
            if echo "$f" | grep -q '^reports/daily/'; then
              HAS_DAILY=true
              SUBJECT="【信息雷达·日报】${fname}"
            elif echo "$f" | grep -q '^reports/weekly/'; then
              HAS_WEEKLY=true
              SUBJECT="【信息雷达·周报】${fname}"
            fi
            BODY="${BODY}
          ========================================
          ${f}
          ========================================

          $(cat "$f")
          "
          done <<< "$FILES"

          if [ "$HAS_DAILY" = true ] && [ "$HAS_WEEKLY" = true ]; then
            SUBJECT="【信息雷达】日报 + 周报已更新"
          fi

          {
            echo "subject<<EOF"
            echo "$SUBJECT"
            echo "EOF"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send via QQ SMTP
        if: steps.mailcfg.outputs.configured == 'true' && steps.detect.outputs.has_files == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.detect.outputs.subject }}
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: 信息雷达 <${{ secrets.MAIL_USERNAME }}>
          body: ${{ steps.detect.outputs.body }}
          convert_markdown: false
