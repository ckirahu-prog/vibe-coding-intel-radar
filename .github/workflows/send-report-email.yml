name: Send Report Email

# 日报/周报 commit 后自动发 QQ 邮箱；周六 10:00 补发最新周报；也可手动 Run
on:
  push:
    branches: [main]
    paths:
      - 'reports/daily/**'
      - 'reports/weekly/**'
  schedule:
    # UTC 02:00 周六 = 北京时间周六 10:00（Weekly Automation 09:00 之后兜底）
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      send_latest:
        description: '手动发送最新报告（daily / weekly / both）'
        required: false
        default: 'weekly'
        type: choice
        options:
          - weekly
          - daily
          - both

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check mail secrets
        id: mailcfg
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          if [ -n "$MAIL_USERNAME" ] && [ -n "$MAIL_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::error::MAIL_USERNAME or MAIL_PASSWORD secret missing"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve report files to send
        id: detect
        env:
          PICK_LATEST_MODE: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
          SEND_LATEST: ${{ inputs.send_latest || 'weekly' }}
        run: |
          FILES=""
          SUBJECT="【信息雷达】新报告"
          HAS_DAILY=false
          HAS_WEEKLY=false

          if [ "$PICK_LATEST_MODE" = "true" ]; then
            echo "Pick-latest mode ($GITHUB_EVENT_NAME): $SEND_LATEST"
            if [ "$SEND_LATEST" = "daily" ] || [ "$SEND_LATEST" = "both" ]; then
              LATEST_DAILY=$(ls -1 reports/daily/*.md 2>/dev/null | grep -v gitkeep | sort | tail -1 || true)
              if [ -n "$LATEST_DAILY" ] && [ -f "$LATEST_DAILY" ]; then
                FILES="${FILES}${LATEST_DAILY}"$'\n'
                HAS_DAILY=true
              fi
            fi
            if [ "$SEND_LATEST" = "weekly" ] || [ "$SEND_LATEST" = "both" ]; then
              LATEST_WEEKLY=$(ls -1 reports/weekly/*.md 2>/dev/null \
                | grep -v gitkeep \
                | grep -v 'side-hustle' \
                | sort \
                | tail -1 || true)
              if [ -n "$LATEST_WEEKLY" ] && [ -f "$LATEST_WEEKLY" ]; then
                FILES="${FILES}${LATEST_WEEKLY}"$'\n'
                HAS_WEEKLY=true
              fi
            fi
          else
            FILES=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
              | grep -E '^reports/(daily|weekly)/.+\.md$' \
              | grep -v 'side-hustle' || true)
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "$f" | grep -q '^reports/daily/' && HAS_DAILY=true
              echo "$f" | grep -q '^reports/weekly/' && HAS_WEEKLY=true
            done <<< "$FILES"
          fi

          FILES=$(echo "$FILES" | sed '/^$/d' | sort -u)

          if [ -z "$FILES" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No report files to send."
            if [ "$PICK_LATEST_MODE" = "true" ]; then
              echo "::warning::未找到可发送的报告文件（Weekly Automation 可能未成功生成周报）"
              exit 0
            fi
            echo "::error::Push 触发了发信 workflow，但未检测到 reports/*.md 变更"
            exit 1
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "Report files:"
          echo "$FILES"

          mkdir -p .email
          echo "$FILES" > .email/files.txt

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            fname=$(basename "$f" .md)
            if echo "$f" | grep -q '^reports/daily/'; then
              SUBJECT="【信息雷达·日报】${fname}"
            elif echo "$f" | grep -q '^reports/weekly/'; then
              SUBJECT="【信息雷达·周报】${fname}"
            fi
          done <<< "$FILES"

          if [ "$HAS_DAILY" = true ] && [ "$HAS_WEEKLY" = true ]; then
            SUBJECT="【信息雷达】日报 + 周报"
          fi

          echo "subject<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUBJECT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build HTML email
        if: steps.detect.outputs.has_files == 'true'
        run: |
          pip install markdown
          mapfile -t REPORT_FILES < .email/files.txt
          python scripts/build_report_email.py .email/body.html "${REPORT_FILES[@]}"

      - name: Send via QQ SMTP
        if: steps.detect.outputs.has_files == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.detect.outputs.subject }}
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file://${{ github.workspace }}/.email/body.html
          content_type: text/html
          priority: normal
